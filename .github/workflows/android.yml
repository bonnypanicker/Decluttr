name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Restore google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "Using GOOGLE_SERVICES_JSON secret"
        elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          printf '%s\n' \
            '{' \
            '  "project_info": {' \
            '    "project_number": "000000000000",' \
            '    "project_id": "decluttr-ci-placeholder",' \
            '    "storage_bucket": "decluttr-ci-placeholder.appspot.com"' \
            '  },' \
            '  "client": [' \
            '    {' \
            '      "client_info": {' \
            '        "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",' \
            '        "android_client_info": {' \
            '          "package_name": "com.tool.decluttr"' \
            '        }' \
            '      },' \
            '      "oauth_client": [],' \
            '      "api_key": [' \
            '        {' \
            '          "current_key": "placeholder"' \
            '        }' \
            '      ],' \
            '      "services": {' \
            '        "appinvite_service": {' \
            '          "other_platform_oauth_client": []' \
            '        }' \
            '      }' \
            '    }' \
            '  ],' \
            '  "configuration_version": "1"' \
            '}' > app/google-services.json
          echo "::warning::GOOGLE_SERVICES_JSON is unavailable for pull_request. Using placeholder config for compile-only CI."
        else
          echo "::error::Missing GOOGLE_SERVICES_JSON secret. CI build is blocked to avoid invalid Firebase API key artifacts."
          exit 1
        fi

    - name: Restore stable debug keystore and print SHA-1
      env:
        DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
        DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
        DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
      run: |
        mkdir -p ~/.android
        if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > ~/.android/debug.keystore
          STOREPASS="${DEBUG_KEYSTORE_PASSWORD:-android}"
          ALIAS="${DEBUG_KEY_ALIAS:-androiddebugkey}"
          KEYPASS="${DEBUG_KEY_PASSWORD:-android}"
          echo "Using persistent debug keystore from GitHub Secrets"
        elif [ -f ".keystore/debug.keystore" ]; then
          cp .keystore/debug.keystore ~/.android/debug.keystore
          STOREPASS="android"
          ALIAS="androiddebugkey"
          KEYPASS="android"
          echo "Using repository .keystore/debug.keystore"
        elif [ -f "app/debug.keystore" ]; then
          cp app/debug.keystore ~/.android/debug.keystore
          STOREPASS="android"
          ALIAS="androiddebugkey"
          KEYPASS="android"
          echo "Using repository debug keystore"
        else
          STOREPASS="android"
          ALIAS="androiddebugkey"
          KEYPASS="android"
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass "$STOREPASS" -alias "$ALIAS" -keypass "$KEYPASS" -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "::warning::Using generated debug keystore. This will not match your permanent Firebase SHA-1."
        fi
        keytool -list -v -keystore ~/.android/debug.keystore -alias "$ALIAS" -storepass "$STOREPASS" -keypass "$KEYPASS" | grep SHA1

    - name: Build Debug APK
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew :app:assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: decluttr-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
