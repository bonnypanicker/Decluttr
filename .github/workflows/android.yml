name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Restore google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "Using GOOGLE_SERVICES_JSON secret"
        elif [ -f "app/google-services.json" ]; then
          echo "Using repository app/google-services.json"
        else
          echo "::error::app/google-services.json is missing and GOOGLE_SERVICES_JSON secret is not set."
          exit 1
        fi

    - name: Restore release upload keystore and export signing env
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
        DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
        DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
      run: |
        if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$RELEASE_KEYSTORE_PASSWORD" ] && [ -n "$RELEASE_KEY_ALIAS" ]; then
          KEYSTORE_B64="$RELEASE_KEYSTORE_BASE64"
          STORE_PASS="$RELEASE_KEYSTORE_PASSWORD"
          KEY_ALIAS_VALUE="$RELEASE_KEY_ALIAS"
          KEY_PASS_VALUE="${RELEASE_KEY_PASSWORD:-$RELEASE_KEYSTORE_PASSWORD}"
          echo "Using RELEASE_* signing secrets"
        elif [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
          KEYSTORE_B64="$DEBUG_KEYSTORE_BASE64"
          STORE_PASS="${DEBUG_KEYSTORE_PASSWORD:-android}"
          KEY_ALIAS_VALUE="${DEBUG_KEY_ALIAS:-androiddebugkey}"
          KEY_PASS_VALUE="${DEBUG_KEY_PASSWORD:-$STORE_PASS}"
          echo "::warning::RELEASE_* secrets missing. Falling back to DEBUG_* signing secrets."
        else
          STORE_PASS="android"
          KEY_ALIAS_VALUE="androiddebugkey"
          KEY_PASS_VALUE="android"
          SIGNING_DIR="$RUNNER_TEMP/signing"
          mkdir -p "$SIGNING_DIR"
          KEYSTORE_PATH="$SIGNING_DIR/release-upload.keystore"
          keytool -genkey -v -keystore "$KEYSTORE_PATH" -storepass "$STORE_PASS" -alias "$KEY_ALIAS_VALUE" -keypass "$KEY_PASS_VALUE" -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=CI Debug,O=Decluttr,C=IN"
          echo "::warning::No RELEASE_* or DEBUG_* secrets found. Generated temporary keystore for CI build. This artifact may fail Play upload due to key mismatch."
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS_VALUE" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$KEY_PASS_VALUE" >> "$GITHUB_ENV"
          keytool -list -v -keystore "$KEYSTORE_PATH" -alias "$KEY_ALIAS_VALUE" -storepass "$STORE_PASS" -keypass "$KEY_PASS_VALUE" | grep SHA1
          exit 0
        fi
        SIGNING_DIR="$RUNNER_TEMP/signing"
        mkdir -p "$SIGNING_DIR"
        KEYSTORE_PATH="$SIGNING_DIR/release-upload.keystore"
        printf '%s' "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"
        echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
        echo "KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
        echo "KEY_ALIAS=$KEY_ALIAS_VALUE" >> "$GITHUB_ENV"
        echo "KEY_PASSWORD=$KEY_PASS_VALUE" >> "$GITHUB_ENV"
        keytool -list -v -keystore "$KEYSTORE_PATH" -alias "$KEY_ALIAS_VALUE" -storepass "$STORE_PASS" -keypass "$KEY_PASS_VALUE" | grep SHA1

    - name: Build Release AAB
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew :app:bundleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: decluttr-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
