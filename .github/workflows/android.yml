name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Restore google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "Using GOOGLE_SERVICES_JSON secret"
        elif [ -f "app/google-services.json" ]; then
          echo "Using repository app/google-services.json"
        else
          echo "::error::app/google-services.json is missing and GOOGLE_SERVICES_JSON secret is not set."
          exit 1
        fi

    - name: Restore release upload keystore and export signing env
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 || vars.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || vars.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || vars.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || vars.RELEASE_KEY_PASSWORD }}
        EXPECTED_UPLOAD_SHA1: 51:04:E0:97:3D:28:2F:63:01:26:EC:C6:2D:B9:38:A0:D2:60:5D:E5
      run: |
        MISSING=()
        [ -z "$RELEASE_KEYSTORE_BASE64" ] && MISSING+=("RELEASE_KEYSTORE_BASE64")
        [ -z "$RELEASE_KEYSTORE_PASSWORD" ] && MISSING+=("RELEASE_KEYSTORE_PASSWORD")
        [ -z "$RELEASE_KEY_ALIAS" ] && MISSING+=("RELEASE_KEY_ALIAS")
        if [ "${#MISSING[@]}" -gt 0 ]; then
          echo "::error::Missing required release signing values: ${MISSING[*]}"
          echo "::notice::Define them in Settings > Secrets and variables > Actions (Repository secrets preferred)."
          exit 1
        fi
        echo "RELEASE_KEYSTORE_BASE64 length: ${#RELEASE_KEYSTORE_BASE64}"
        echo "RELEASE_KEYSTORE_PASSWORD length: ${#RELEASE_KEYSTORE_PASSWORD}"
        echo "RELEASE_KEY_ALIAS length: ${#RELEASE_KEY_ALIAS}"

        KEYSTORE_B64="$RELEASE_KEYSTORE_BASE64"
        STORE_PASS="$RELEASE_KEYSTORE_PASSWORD"
        KEY_ALIAS_VALUE="$RELEASE_KEY_ALIAS"
        KEY_PASS_VALUE="${RELEASE_KEY_PASSWORD:-$RELEASE_KEYSTORE_PASSWORD}"

        SIGNING_DIR="$RUNNER_TEMP/signing"
        mkdir -p "$SIGNING_DIR"
        KEYSTORE_PATH="$SIGNING_DIR/release-upload.keystore"
        printf '%s' "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"
        echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
        echo "KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
        echo "KEY_ALIAS=$KEY_ALIAS_VALUE" >> "$GITHUB_ENV"
        echo "KEY_PASSWORD=$KEY_PASS_VALUE" >> "$GITHUB_ENV"
        ACTUAL_SHA1="$(keytool -list -v -keystore "$KEYSTORE_PATH" -alias "$KEY_ALIAS_VALUE" -storepass "$STORE_PASS" -keypass "$KEY_PASS_VALUE" | awk -F': ' '/SHA1/{print $2; exit}')"
        echo "Using upload key SHA1: $ACTUAL_SHA1"
        if [ "$(echo "$ACTUAL_SHA1" | tr '[:lower:]' '[:upper:]')" != "$(echo "$EXPECTED_UPLOAD_SHA1" | tr '[:lower:]' '[:upper:]')" ]; then
          echo "::error::Upload keystore SHA1 mismatch. Expected $EXPECTED_UPLOAD_SHA1 but found $ACTUAL_SHA1."
          exit 1
        fi

    - name: Build Debug APK (PR validation)
      if: github.event_name == 'pull_request'
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew :app:assembleDebug

    - name: Build Release AAB
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew :app:bundleRelease

    - name: Upload AAB
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: decluttr-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
