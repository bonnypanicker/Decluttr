name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Restore google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "Using GOOGLE_SERVICES_JSON secret"
        elif [ -f "app/google-services.json" ]; then
          echo "Using repository app/google-services.json"
        else
          echo "::error::app/google-services.json is missing and GOOGLE_SERVICES_JSON secret is not set."
          exit 1
        fi

    - name: Restore release upload keystore and export signing env
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        if [ -z "$RELEASE_KEYSTORE_BASE64" ] || [ -z "$RELEASE_KEYSTORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ]; then
          echo "::error::Missing release signing secrets. Set RELEASE_KEYSTORE_BASE64, RELEASE_KEYSTORE_PASSWORD and RELEASE_KEY_ALIAS."
          exit 1
        fi
        KEY_PASS="${RELEASE_KEY_PASSWORD:-$RELEASE_KEYSTORE_PASSWORD}"
        SIGNING_DIR="$RUNNER_TEMP/signing"
        mkdir -p "$SIGNING_DIR"
        KEYSTORE_PATH="$SIGNING_DIR/release-upload.keystore"
        printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
        echo "KEYSTORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
        echo "KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
        echo "KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"
        keytool -list -v -keystore "$KEYSTORE_PATH" -alias "$RELEASE_KEY_ALIAS" -storepass "$RELEASE_KEYSTORE_PASSWORD" -keypass "$KEY_PASS" | grep SHA1

    - name: Build Release AAB
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew :app:bundleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: decluttr-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
